name: Build Android App (.aab)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android.keystore

      - name: Build Android App Bundle
        run: |
          bubblewrap build --signingKeyPath=./android.keystore --signingKeyPassword="${{ secrets.KEYSTORE_PASSWORD }}" --signingKeyAlias="android" --signingKeyAliasPassword="${{ secrets.KEYSTORE_PASSWORD }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app-release-bundle.aab
